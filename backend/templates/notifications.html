<!DOCTYPE HTML>
<html>
    <head>
        <title>notifications</title>
        <style>
            body{
                font-family:Arial;
                background:#f4f4f4;
                
            }
            .box{
                width:60%;
                margin:auto;
                background:white;
                padding:20px;
                border-radius:10px;
            }
            .notification{
                background:#e3f2fd;
                padding:10px;
                margin:10px 0;
                border-left:5px solid blue;

            }
        </style>

    </head>
    <body>
        <h2>Notifications</h2>

{% if notifications %}
{% for n in notifications %}

<div class="notification">
    {{ n[2] }}
</div>

{% endfor %}

{% else %}

<p> No Notification</p>

{% endif %}
<a href="/student">Back</a>

    </body>
    </html>
