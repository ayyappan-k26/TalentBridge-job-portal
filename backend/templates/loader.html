<!DOCTYPE html>
<html>
<head>

<title>Loading</title>

<script>
setTimeout(function(){
    window.location.href="/home";
},2000);
</script>

<style>
.loader{
border:6px solid #eee;
border-top:6px solid blue;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
margin-top:200px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>

</head>

<body>

<div class="loader"></div>

</body>
</html>
